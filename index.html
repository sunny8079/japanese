<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>엄마의 일본 여행 일본어 회화</title>
  <meta name="description" content="일본 여행을 위한 기초 일본어 회화 가이드 - 상황별 단어와 문장" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFF9F0;
      --bg2: #FFF3E0;
      --card: #FFFFFF;
      --card-hover: #FFF0DB;
      --accent: #D84315;
      --accent2: #E65100;
      --accent3: #1565C0;
      --gold: #E65100;
      --text: #212121;
      --text-sub: #424242;
      --border: rgba(0,0,0,0.12);
      --shadow: 0 4px 16px rgba(0,0,0,0.10);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: 18px;
      -webkit-text-size-adjust: 100%;
    }

    /* ── 배경 파티클 ── */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.10;
    }
    .orb1 { width: 500px; height: 500px; background: #FFE0B2; top: -100px; left: -100px; animation: drift1 12s ease-in-out infinite alternate; }
    .orb2 { width: 400px; height: 400px; background: #FFCCBC; bottom: -80px; right: -80px; animation: drift2 10s ease-in-out infinite alternate; }
    .orb3 { width: 300px; height: 300px; background: #BBDEFB; top: 40%; left: 50%; animation: drift3 14s ease-in-out infinite alternate; }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px,40px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-50px,-30px); } }
    @keyframes drift3 { from { transform: translate(-50%,-50%); } to { transform: translate(-55%,-45%); } }

    /* ── 헤더 ── */
    header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 48px 20px 32px;
    }
    .header-emoji { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 10px;
    }
    header p {
      color: var(--text-sub);
      font-size: 1.15rem;
      font-weight: 500;
    }

    /* ── 검색 ── */
    .search-wrap {
      position: relative; z-index: 10;
      max-width: 480px; margin: 0 auto 32px;
      padding: 0 20px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 16px 22px 16px 52px;
      color: var(--text);
      font-size: 1.1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
      box-shadow: var(--shadow);
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-sub); }
    .search-icon {
      position: absolute; left: 36px; top: 50%; transform: translateY(-50%);
      font-size: 1.3rem; pointer-events: none;
    }

    /* ── 카테고리 탭 ── */
    .categories {
      position: relative; z-index: 10;
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center;
      padding: 0 20px 32px;
      max-width: 900px; margin: 0 auto;
    }
    .cat-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 14px 22px;
      color: var(--text-sub);
      font-size: 1.05rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }
    .cat-btn:hover { border-color: var(--accent); color: var(--text); transform: translateY(-2px); }
    .cat-btn.active {
      background: var(--accent);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 20px rgba(216,67,21,0.35);
      transform: translateY(-2px);
    }
    .cat-icon { font-size: 1.3rem; }

    /* ── 콘텐츠 영역 ── */
    main {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto;
      padding: 0 20px 60px;
    }

    .section-title {
      font-size: 1.4rem; font-weight: 700;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-title span.icon { font-size: 1.8rem; }

    /* ── 카드 그리드 ── */
    .phrases-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .phrase-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .phrase-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,183,77,0.08), rgba(255,138,101,0.08));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .phrase-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(216,67,21,0.15);
    }
    .phrase-card:hover::before { opacity: 1; }
    .phrase-card.playing {
      border-color: var(--accent3);
      box-shadow: 0 0 0 3px rgba(21,101,192,0.25);
      animation: pulse 0.4s ease;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .korean-text {
      font-size: 1.25rem;
      color: var(--text);
      font-weight: 600;
      line-height: 1.5;
    }
    .speak-btn {
      background: rgba(216,67,21,0.1);
      border: none; border-radius: 50%;
      width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--accent);
      transition: all 0.2s;
      flex-shrink: 0;
      margin-left: 10px;
    }
    .speak-btn:hover { background: var(--accent); color: #fff; transform: scale(1.1); }

    .japanese-text {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .pronunciation {
      font-size: 1.1rem;
      color: var(--accent3);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* ── 없을 때 ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-sub);
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--accent3);
      border: none;
      color: #fff;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(21,101,192,0.3);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── 반응형 (모바일 1열) ── */
    @media (max-width: 768px) {
      .phrases-grid { grid-template-columns: 1fr; gap: 14px; }
      .phrase-card { padding: 22px; }
      .japanese-text { font-size: 1.6rem; }
      .korean-text { font-size: 1.15rem; }
      .pronunciation { font-size: 1.0rem; }
      .cat-btn { padding: 12px 18px; font-size: 1.0rem; }
      header { padding: 36px 16px 24px; }
      header h1 { font-size: 1.6rem; }
      header p { font-size: 1.05rem; }
      .search-wrap input { font-size: 1.05rem; padding: 14px 20px 14px 48px; }
      .section-title { font-size: 1.25rem; }
      .speak-btn { width: 48px; height: 48px; font-size: 1.3rem; }
    }

    /* ── 상단 배너 ── */
    .tip-banner {
      position: relative; z-index: 10;
      max-width: 700px; margin: 0 auto 28px;
      padding: 0 20px;
    }
    .tip-inner {
      background: #FFF3E0;
      border: 2px solid #FFB74D;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 1.05rem;
      font-weight: 500;
      color: #E65100;
      display: flex; align-items: center; gap: 12px;
    }

    /* ── 카드 개수 뱃지 ── */
    .count-badge {
      background: rgba(216,67,21,0.1);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--accent);
      margin-left: auto;
    }

    /* ── 위로가기 버튼 ── */
    .scroll-top-btn {
      position: fixed;
      bottom: 32px;
      right: 24px;
      z-index: 900;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(216,67,21,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
    }
    .scroll-top-btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .scroll-top-btn:hover {
      background: var(--accent2);
      transform: translateY(-2px);
    }
    @media (max-width: 768px) {
      .scroll-top-btn {
        bottom: 24px;
        right: 18px;
        width: 52px;
        height: 52px;
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

<!-- 배경 -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- 헤더 -->
<header>
  <span class="header-emoji">🌸</span>
  <h1>엄마의 일본 여행 회화</h1>

<div class="tip-banner">

  </div>
</div>

<!-- 검색 -->
<div class="search-wrap">
  <span class="search-icon">🔍</span>

<!-- 카테고리 -->
<div class="categories" id="categoryTabs"></div>

<!-- 메인 콘텐츠 -->
<main>

    <span class="icon" id="sectionIcon">🗂️</span>

  </div>
  <div class="phrases-grid" id="phrasesGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">

</main>

<!-- 토스트 -->
<div class="toast" id="toast">🔊 재생 중...</div>

<!-- 위로가기 버튼 -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="위로 가기" title="맨 위로">⬆</button>

// ──────────────────────────────────────────────
// 상태
// ──────────────────────────────────────────────
let currentCat = 'all';
let searchQuery = '';

// ──────────────────────────────────────────────
// 유틸
// ──────────────────────────────────────────────
function getAllPhrases() {
  return categories
    .filter(c => c.id !== 'all')
    .flatMap(c => c.phrases.map(p => ({ ...p, catIcon: c.icon, catId: c.id })));
}

function getFilteredPhrases() {
  let list = currentCat === 'all'
    ? getAllPhrases()
    : (categories.find(c => c.id === currentCat)?.phrases || []).map(p => ({
        ...p,
        catIcon: categories.find(c => c.id === currentCat).icon,
        catId: currentCat,
      }));

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p =>
      p.ko.toLowerCase().includes(q) ||
      p.ja.includes(q) ||
      p.rom.includes(q)
    );
  }
  return list;
}

// ──────────────────────────────────────────────
// TTS (자연스러운 일본어 발음)
// ──────────────────────────────────────────────
let jaVoice = null;
let voicesReady = false;
let currentAudio = null;

// 일본어 음성 찾기 (Google, Microsoft 등 고품질 음성 우선)
function findBestJapaneseVoice() {
  const voices = window.speechSynthesis.getVoices();
  const jaVoices = voices.filter(v => v.lang === 'ja-JP' || v.lang === 'ja' || v.lang.startsWith('ja'));
  
  if (jaVoices.length === 0) return null;
  
  // 고품질 음성 우선 순위
  const priority = ['google', 'microsoft', 'nanami', 'keita', 'haruka', 'sayaka'];
  for (const keyword of priority) {
    const match = jaVoices.find(v => v.name.toLowerCase().includes(keyword));
    if (match) return match;
  }
  
  // 없으면 아무 일본어 음성이라도 사용
  return jaVoices[0];
}

function loadVoices() {
  return new Promise(resolve => {
    const voices = window.speechSynthesis.getVoices();
    if (voices.length > 0) {
      jaVoice = findBestJapaneseVoice();
      voicesReady = true;
      resolve();
      return;
    }
    // 비동기 로딩 대기 (모바일 브라우저)
    let attempts = 0;
    const handler = () => {
      jaVoice = findBestJapaneseVoice();
      voicesReady = true;
      window.speechSynthesis.removeEventListener('voiceschanged', handler);
      resolve();
    };
    window.speechSynthesis.addEventListener('voiceschanged', handler);
    // 3초 안에 로드 안되면 타임아웃
    setTimeout(() => {
      if (!voicesReady) {
        jaVoice = findBestJapaneseVoice();
        voicesReady = true;
        resolve();
      }
    }, 3000);
  });
}

// 페이지 로드 시 음성 준비
if (window.speechSynthesis) {
  loadVoices().then(() => {
    if (jaVoice) {
      console.log('✅ 일본어 음성:', jaVoice.name, jaVoice.lang);
    } else {
      console.warn('⚠️ 일본어 음성 없음 - Google TTS 사용');
    }
  });
}

function cleanTextForTTS(text) {
  // 1. 괄호 안에 히라가나가 있으면 그것을 TTS용으로 사용
  //    예: 十円（じゅうえん）→ じゅうえん
  const furigana = text.match(/（([^）]+)）/) || text.match(/\(([^)]+)\)/);
  if (furigana && /[\u3040-\u309F]/.test(furigana[1])) {
    return furigana[1];
  }
  
  // 2. "一 / 1" 형태 → 한자 부분만 (숫자 제거)
  let cleaned = text.replace(/\s*\/\s*\d+/g, '');
  
  // 3. 〜 기호 제거 (TTS가 읽으면 이상함)
  cleaned = cleaned.replace(/[〜~]/g, '');
  
  // 4. 남은 괄호 내용 제거
  cleaned = cleaned.replace(/（[^）]*）/g, '');
  cleaned = cleaned.replace(/\([^)]*\)/g, '');
  
  return cleaned.trim();
}

function speak(text, card) {
  // 이전 재생 정지
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }

  const cleanText = cleanTextForTTS(text);
  card.classList.add('playing');
  showToast('🔊 재생 중...');

  // 일본어 음성이 있으면 SpeechSynthesis 사용 (가장 안정적)
  if (window.speechSynthesis && jaVoice) {
    speakWithVoice(cleanText, card);
  } else {
    // 일본어 음성 없으면 Google TTS 시도
    speakWithGoogle(cleanText, card);
  }
}

function speakWithVoice(text, card) {
  const utter = new SpeechSynthesisUtterance(text);
  utter.voice = jaVoice;
  utter.lang = 'ja-JP';
  utter.rate = 0.75;  // 어르신 맞춤 느린 속도
  utter.pitch = 1.0;

  utter.onend = () => card.classList.remove('playing');
  utter.onerror = () => {
    // SpeechSynthesis 실패 → Google TTS로 대체
    speakWithGoogle(text, card);
  };
  window.speechSynthesis.speak(utter);
}

function speakWithGoogle(text, card) {
  const encoded = encodeURIComponent(text);
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encoded}&tl=ja&client=tw-ob`;
  
  const audio = new Audio(url);
  currentAudio = audio;
  
  audio.onended = () => {
    card.classList.remove('playing');
    currentAudio = null;
  };
  audio.onerror = () => {
    card.classList.remove('playing');
    currentAudio = null;
    // 둘 다 실패하면 내장 TTS라도 시도
    if (window.speechSynthesis) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'ja-JP';
      utter.rate = 0.75;
      utter.onend = () => card.classList.remove('playing');
      utter.onerror = () => {
        card.classList.remove('playing');
        showToast('⚠️ 음성을 재생할 수 없어요');
      };
      window.speechSynthesis.speak(utter);
    } else {
      showToast('⚠️ 음성을 재생할 수 없어요');
    }
  };
  
  audio.play().catch(() => {
    audio.onerror();
  });
}

// ──────────────────────────────────────────────
// 토스트
// ──────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ──────────────────────────────────────────────
// 렌더
// ──────────────────────────────────────────────
function renderCategories() {
  const wrap = document.getElementById('categoryTabs');
  wrap.innerHTML = '';
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (currentCat === cat.id ? ' active' : '');
    btn.dataset.id = cat.id;
    btn.innerHTML = '<span class="cat-icon">' + cat.icon + '</span>' + cat.label;
    btn.addEventListener('click', () => {
      currentCat = cat.id;
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      renderCategories();
      renderPhrases();
    });
    wrap.appendChild(btn);
  });
}

function renderPhrases() {
  const grid = document.getElementById('phrasesGrid');
  const empty = document.getElementById('emptyState');
  const label = document.getElementById('sectionLabel');
  const icon = document.getElementById('sectionIcon');
  const badge = document.getElementById('countBadge');

  const cat = categories.find(c => c.id === currentCat);
  label.textContent = cat ? cat.label : '전체';
  icon.textContent = cat ? cat.icon : '🗂️';

  const phrases = getFilteredPhrases();
  badge.textContent = phrases.length + '개';

  grid.innerHTML = '';
  if (phrases.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  phrases.forEach(p => {
    const card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML =
      '<div class="card-header">' +
        '<div class="korean-text">' + p.ko + '</div>' +
        '<button class="speak-btn" title="발음 듣기" aria-label="발음 듣기">🔊</button>' +
      '</div>' +
      '<div class="japanese-text">' + p.ja + '</div>' +
      '<div class="pronunciation">' + p.rom + '</div>';
    card.addEventListener('click', () => speak(p.ja, card));
    card.querySelector('.speak-btn').addEventListener('click', e => {
      e.stopPropagation();
      speak(p.ja, card);
    });
    grid.appendChild(card);
  });
}

// ──────────────────────────────────────────────
// 검색
// ──────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  if (searchQuery) {
    currentCat = 'all';
    renderCategories();
  }
  renderPhrases();
});

// ──────────────────────────────────────────────
// 초기화
// ──────────────────────────────────────────────
renderCategories();
renderPhrases();
